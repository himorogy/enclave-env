name: Publish to npm

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # push version commit + tag to main
      id-token: write  # npm provenance attestation via Sigstore

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - run: pnpm install --frozen-lockfile

      - name: Check pending changesets exist
        run: |
          COUNT=$(ls .changeset/*.md 2>/dev/null | grep -v README | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "Error: no changeset files found. Run 'pnpm changeset add' before releasing."
            exit 1
          fi
          echo "Found ${COUNT} changeset file(s)."

      - run: pnpm test

      - name: Version packages (updates package.json + CHANGELOG.md)
        run: pnpm changeset version

      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version bump and push tag
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: release v${VERSION}"
          git tag "v${VERSION}"
          git push origin main --tags
